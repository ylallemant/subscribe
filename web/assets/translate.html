<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Translate · SubScribe</title>
    <script>(function(){var t=localStorage.getItem("st:theme");if(t==="light"||t==="dark")document.documentElement.setAttribute("data-theme",t);})();</script>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="app translate">
    <header class="topbar">
      <div class="brand"><a href="/">🎬 SubScribe</a></div>
      <nav class="tabs">
        <a id="translate-link" href="/translate.html" class="active">Translate</a>
        <a id="textview-link" href="/textview.html">Text view</a>
      </nav>
      <span class="topbar-sep" aria-hidden="true"></span>
      <div class="project-controls" id="project-controls" hidden>
        <label>Language <select id="lang-select"></select></label>
        <span id="save-status" class="save-status"></span>
      </div>
      <div class="export-controls">
        <select id="export-format" title="Export format">
          <option value="plain">.txt (plain)</option>
          <option value="srt">.srt (SubRip)</option>
          <option value="vtt">.vtt (WebVTT)</option>
        </select>
        <button id="download-btn" class="btn primary">Download</button>
      </div>
      <div class="monitor-controls">
        <label>Ratio <select id="ratio-select"></select></label>
        <label>Text
          <select id="textsize-select" title="Caption text size">
            <option value="0.8">Small</option>
            <option value="1" selected>Medium</option>
            <option value="1.3">Large</option>
            <option value="1.6">X-Large</option>
          </select>
        </label>
      </div>
      <div class="topbar-actions">
        <span id="file-name" class="file-name"></span>
      </div>
    </header>

    <!-- Preview monitors -->
    <section class="monitors" id="monitors">
      <div class="monitors-row">
        <div class="monitor">
          <div class="monitor-label">Original</div>
          <div class="screen"><div class="caption"></div></div>
        </div>
        <div class="monitor">
          <div class="monitor-label">Translation</div>
          <div class="screen"><div class="caption"></div></div>
        </div>
      </div>
    </section>

    <!-- 4-column workbench -->
    <div class="workbench">
      <div class="grid-head">
        <div class="head-cols">
          <div class="col-time">Time frame</div>
          <div class="col-ref">Reference</div>
          <div class="col-tr">Translation</div>
        </div>
        <div class="col-map">Overview</div>
      </div>
      <div class="grid-body-wrap">
        <div id="rows-scroll" class="rows-scroll">
          <div id="rows" class="rows"></div>
        </div>
        <div id="minimap" class="minimap" title="File overview — click or drag to jump">
          <canvas id="minimap-canvas"></canvas>
          <div id="minimap-viewport" class="mm-viewport"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/js/translate.js"></script>
  </body>
</html>
